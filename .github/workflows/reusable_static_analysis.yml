name: Reusable Static Analysis

on:
  workflow_call:

jobs:
  static_analysis:
    name: Mypy & Ruff Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Restore Mypy Cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Install Dependencies
        run: uv sync --extra dev

      - name: Run Mypy
        run: uv run mypy src

      - name: Run Ruff Check
        run: uv run ruff check src tests
