services:
  db:
    image: postgres:16-alpine
    container_name: leanguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    container_name: leanguard_mlflow
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT}:${MLFLOW_PORT}"
    environment:
      MLFLOW_BACKEND_STORE_URI: >-
        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    entrypoint: >
      bash -c "
      pip install --quiet --no-cache-dir psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port ${MLFLOW_PORT}
      --default-artifact-root /mlflow/artifacts
      "
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${MLFLOW_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


volumes:
  postgres_data:
  mlflow_artifacts:
